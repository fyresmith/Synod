name: ci

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'server/**'
      - 'client/**'
      - 'packages/contracts/**'
      - 'release/synod-client.lock.json'
      - 'artifacts/synod-client/**'
      - 'tools/contracts/**'
      - 'tools/synod-client/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'server/**'
      - 'client/**'
      - 'packages/contracts/**'
      - 'release/synod-client.lock.json'
      - 'artifacts/synod-client/**'
      - 'tools/contracts/**'
      - 'tools/synod-client/**'
      - '.github/workflows/ci.yml'

jobs:
  server:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify pinned synod-client artifacts
        run: node tools/synod-client/verify-lock.mjs

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify local contracts sync
        run: npm run contracts:verify

      - name: Setup assets
        run: npm run setup:assets --workspace @fyresmith/synod

      - name: Lint
        run: npm run lint --workspace @fyresmith/synod

      - name: Format check
        run: npm run format:check --workspace @fyresmith/synod

      - name: Run tests
        run: npm test --workspace @fyresmith/synod

      - name: Build server package
        run: npm run build --workspace @fyresmith/synod

  client:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify local contracts sync
        run: npm run contracts:verify

      - name: Type check
        run: npm run typecheck --workspace @fyresmith/synod-client

      - name: Build and validate BRAT assets
        run: npm run build:brat --workspace @fyresmith/synod-client
